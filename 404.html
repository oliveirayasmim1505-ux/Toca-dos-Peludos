<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Toca dos Peludos</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .nf-emoji {
      font-size: 80px;
      animation: wobble 2s ease-in-out infinite;
      margin-bottom: 16px;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }
    .nf-code { font-size: 80px; font-weight: 800; color: #f8bbd0; line-height: 1; margin-bottom: 8px; }
    .nf-title { font-size: 22px; font-weight: 800; color: var(--pink-dark); margin-bottom: 8px; }
    .nf-sub   { font-size: 15px; color: #bbb; margin-bottom: 32px; max-width: 340px; line-height: 1.6; }
    .nf-btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #f06292, #e75480);
      color: #fff;
      border-radius: 50px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(231,84,128,.3);
      transition: transform .2s;
    }
    .nf-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="not-found">
  <div class="nf-emoji">🐾</div>
  <div class="nf-code">404</div>
  <div class="nf-title">Ops! Página não encontrada</div>
  <p class="nf-sub">Parece que esse bichinho fugiu... Não encontramos a página que você procura.</p>
  <a href="index.html" class="nf-btn">🏠 Voltar ao início</a>
</div>
</body>
</html>
