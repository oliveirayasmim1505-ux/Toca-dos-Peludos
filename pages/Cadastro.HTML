<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Toca dos Peludos</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding: 20px; }
    .cadastro-box { width: 100%; max-width: 520px; margin: 40px auto; }
    .cadastro-icon { font-size: 48px; margin-bottom: 8px; }
    label {
      display: block; text-align: left; font-size: 12px; font-weight: 700;
      color: #bbb; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;
    }
    .field { margin-bottom: 4px; }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="logo">🐾</span>
    <h1>Toca dos Peludos</h1>
  </div>
  <nav class="nav-links">
    <a href="../index.html">Início</a>
    <a href="pets.html">Pets</a>
    <a href="Cadastro.HTML" class="ativo">Adotar</a>
    <a href="login.html">Admin</a>
  </nav>
</header>

<div class="container cadastro-box">
  <div class="cadastro-icon">🐾</div>
  <h2>Quero Adotar!</h2>

  <form id="formCadastro">
    <div class="field">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: Ana Paula Silva" required>
    </div>
    <div class="field">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required inputmode="numeric">
    </div>
    <div class="field">
      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required inputmode="numeric">
    </div>
    <div class="field">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" placeholder="Rua, número, bairro" required>
    </div>
    <div class="field">
      <label for="moradia">Tipo de moradia</label>
      <select id="moradia">
        <option>🏠 Casa</option>
        <option>🏢 Apartamento</option>
      </select>
    </div>
    <div class="field">
      <label for="animais">Já tem outros animais?</label>
      <select id="animais">
        <option>Não</option>
        <option>Sim</option>
      </select>
    </div>
    <div class="field">
      <label for="espaco">Espaço disponível</label>
      <input type="text" id="espaco" placeholder="Ex: quintal grande, varanda...">
    </div>
    <button type="submit">💕 Enviar Cadastro</button>
    <p id="erroMsg" style="color:#e57373;font-size:13px;margin-top:10px;font-weight:600;"></p>
  </form>

  <a href="../index.html" class="link">← Voltar ao início</a>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">🐾</div>
    <div class="footer-title">Toca dos Peludos</div>
    <div class="footer-sub">Feito com muito 💕 — Todo pet merece um lar</div>
  </div>
</footer>

<script src="../js/script.js"></script>
<script src="../js/cadastro.js"></script>
</body>
</html>
