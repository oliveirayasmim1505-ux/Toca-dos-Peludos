<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Adotante</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
 <h2>🐾 Cadastro de Adotante</h2>

  <form id="formCadastro">
    
    <label>Nome</label>
    <input type="text" id="nome">
    <small class="erro"></small>

    <label>CPF</label>
    <input type="text" id="cpf" maxlength="14">
    <small class="erro"></small>

    <label>Telefone</label>
    <input type="text" id="telefone" maxlength="15">
    <small class="erro"></small>

    <label>Endereço</label>
    <input type="text" id="endereco">
    <small class="erro"></small>

    <label>Tipo de Moradia</label>
    <select id="moradia">
      <option value="">Selecione</option>
      <option value="Casa">Casa</option>
      <option value="Apartamento">Apartamento</option>
    </select>
    <small class="erro"></small>

    <!-- 👇 AQUI ESTAVA O PROBLEMA -->
    <label>Possui outros animais?</label>
    <select id="animais">
      <option value="">Selecione</option>
      <option value="Não">Não</option>
      <option value="Sim">Sim</option>
    </select>
    <small class="erro"></small>

    <label>Espaço disponível</label>
    <select id="espaco">
      <option value="">Selecione</option>
      <option value="Pequeno">Pequeno</option>
      <option value="Médio">Médio</option>
      <option value="Grande">Grande</option>
    </select>
    <small class="erro"></small>

    <button type="submit">Cadastrar</button>

    <a href="dashboard.html" class="link">Ver Adotantes</a>

  </form>
</div>

<script src="script.js"></script>
</body>
</html>
